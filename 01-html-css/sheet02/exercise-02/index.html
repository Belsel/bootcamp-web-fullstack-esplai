<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta de alumno</title>
  </head>
  <body>
    <main>
      <form>
        <fieldset>
          <legend>Datos del alumno</legend>
          <label for="usernamefield">Nombre de usuario:</label>
          <input type="text" id="usernamefield" name="username" required />
          <label for="emailfield">Correo electrónico:</label>
          <input type="email" name="email" id="emailfield" required />
          <label for="passwordfield">Contraseña:</label>
          <input
            type="password"
            name="password"
            id="passwordfield"
            minlength="8"
            required
          />
          <label for="agefield">Edad:</label>
          <input type="number" name="age" id="agefield" min="0" />
          <label for="porfoliolinkfield">Enlace al portfolio:</label>
          <input type="url" name="portfolio" id="porfoliolinkfield" />
          <label for="termsfield">Acepto los términos y condiciones:</label>
          <input type="checkbox" name="terms" id="termsfield" required />
          <button type="submit">Enviar</button>
          <button type="reset">Limpiar</button>
        </fieldset>
      </form>
    </main>
  </body>
</html>
