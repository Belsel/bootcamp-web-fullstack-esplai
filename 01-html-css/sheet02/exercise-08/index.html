<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de progreso del alumno</title>
  </head>
  <body>
    <main>
      <section>
        <h2>Progreso del curso</h2>
        <progress value="70" max="100"></progress>
        <h2>Nota del curso</h2>
        <meter value="70" min="0" max="100"></meter>
        <h2>Progreso de las tareas</h2>
        <progress value="5" max="10"></progress>
        <h2>Calificación de las tareas</h2>
        <meter value="5" min="0" max="10"></meter>
      </section>
    </main>
  </body>
</html>
